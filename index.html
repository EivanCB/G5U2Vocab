<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Transport Ninja - Final</title>
    <style>
        :root {
            --mario-red: #E52521; --mario-blue: #049CD8; --mario-yellow: #FBD000;
            --mario-green: #43B047; --font: 'Glacial Indifference', sans-serif;
        }
        body { margin: 0; background: #5C94FC; font-family: var(--font), Arial, sans-serif; color: white; overflow: hidden; user-select: none; }
        
        #ui-layer { height: 12vh; display: flex; justify-content: space-around; align-items: center; background: rgba(0,0,0,0.8); border-bottom: 4px solid var(--mario-yellow); z-index: 500; position: relative; }
        .timer { font-size: 3rem; color: var(--mario-yellow); font-weight: bold; min-width: 100px; text-align: center; }
        .score-box { font-size: 2rem; background: rgba(255,255,255,0.1); padding: 5px 20px; border-radius: 10px; min-width: 120px; text-align: center; }

        /* New Control Buttons */
        .controls-top { display: flex; gap: 15px; }
        .ctrl-btn { padding: 10px 20px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; border: 3px solid white; cursor: pointer; color: white; text-transform: uppercase; }
        #pause-btn { background: var(--mario-blue); }
        #restart-btn { background: var(--mario-red); }

        #game-area { display: flex; height: 88vh; position: relative; }
        .player-side { flex: 1; position: relative; overflow: hidden; }
        #p1-side { border-right: 4px solid var(--mario-yellow); background: linear-gradient(to bottom, #5C94FC, #2d5ea0); }
        #p2-side { background: linear-gradient(to bottom, #5C94FC, #2d5ea0); }

        .target-prompt {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 10px 30px; border-radius: 50px;
            font-size: 2.5rem; font-weight: bold; border: 4px solid var(--mario-red);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 50;
        }

        .transport-item {
            position: absolute; width: 110px; height: 110px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
            cursor: pointer;
        }

        .praise-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4.5rem; font-weight: bold; color: var(--mario-yellow);
            text-shadow: 4px 4px #000; display: none; z-index: 60; pointer-events: none;
            text-align: center; width: 100%;
        }

        /* Pause & Freeze Overlays */
        .full-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            display: none; justify-content: center; align-items: center; 
            font-size: 4rem; z-index: 600; font-weight: bold; color: white;
        }
        .freeze-overlay { background: rgba(4, 156, 216, 0.7); }
        #pause-overlay { background: rgba(0, 0, 0, 0.65); pointer-events: auto; }

        #end-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="score-box">P1: <span id="s1">0</span></div>
    <div class="controls-top">
        <button id="pause-btn" class="ctrl-btn" onclick="togglePause()">Pause</button>
        <div class="timer" id="clock">90</div>
        <button id="restart-btn" class="ctrl-btn" onclick="location.reload()">Restart</button>
    </div>
    <div class="score-box">P2: <span id="s2">0</span></div>
</div>

<div id="game-area">
    <div class="player-side" id="p1-side">
        <div class="target-prompt" id="prompt1">...</div>
        <div class="praise-msg" id="praise1">GREAT!</div>
        <div class="full-overlay freeze-overlay" id="f1">WAIT!</div>
    </div>
    <div class="player-side" id="p2-side">
        <div class="target-prompt" id="prompt2">...</div>
        <div class="praise-msg" id="praise2">AWESOME!</div>
        <div class="full-overlay freeze-overlay" id="f2">WAIT!</div>
    </div>
    <div id="pause-overlay" class="full-overlay" onclick="togglePause()">PAUSED<br><span style="font-size: 1.5rem;">Tap to Resume</span></div>
</div>

<div id="end-screen">
    <h1 id="winner-text" style="font-size: 5rem; color: var(--mario-yellow);"></h1>
    <button onclick="location.reload()" style="padding: 20px 50px; font-size: 2rem; cursor: pointer;">PLAY AGAIN</button>
</div>

<script>
    const transportData = [
        { name: 'bike', img: 'https://drive.google.com/thumbnail?id=1E49x7ucD1ayXuICNPUl9FBhCb0LbDq3h&sz=w200' },
        { name: 'bus', img: 'https://drive.google.com/thumbnail?id=1yAI6sTn-4yXQRxABVqIdpbWBflInsnhh&sz=w200' },
        { name: 'car', img: 'https://drive.google.com/thumbnail?id=17msbO_eVw19xRGJlbgODhNb4d-re40j0&sz=w200' },
        { name: 'MRT', img: 'https://drive.google.com/thumbnail?id=1id7tPjCH05HCvbHyh9vLMXaReaYyJCml&sz=w200' },
        { name: 'plane', img: 'https://drive.google.com/thumbnail?id=11eCEzkNZi9YxrsPZ_WBpIBygWREFW6hL&sz=w200' },
        { name: 'scooter', img: 'https://drive.google.com/thumbnail?id=1Z1-nC3JS0AXNkfWstv06u3df-Oim4Tht&sz=w200' },
        { name: 'taxi', img: 'https://drive.google.com/thumbnail?id=1BBMdVDVsxXY89ZMKFqtKLu_c2TGz4Dk0&sz=w200' },
        { name: 'train', img: 'https://drive.google.com/thumbnail?id=1jK5zkdNDbbFEKE7pXMxDlVHM426HomMx&sz=w200' }
    ];

    const praises = ["Great!", "Awesome!", "Perfect!", "Excellent!", "Good job!"];
    let state = {
        p1: { score: 0, target: null, frozen: false, intervals: [] },
        p2: { score: 0, target: null, frozen: false, intervals: [] },
        time: 90,
        paused: false
    };

    function togglePause() {
        state.paused = !state.paused;
        document.getElementById('pause-overlay').style.display = state.paused ? 'flex' : 'none';
        document.getElementById('pause-btn').innerText = state.paused ? 'Resume' : 'Pause';
    }

    function clearLevel(p) {
        const side = document.getElementById(`p${p}-side`);
        side.querySelectorAll('.transport-item').forEach(item => item.remove());
        state[`p${p}`].intervals.forEach(inv => clearInterval(inv));
        state[`p${p}`].intervals = [];
    }

    function spawnLevel(p) {
        if (state.time <= 0 || state[`p${p}`].frozen) return;
        clearLevel(p);
        const index = Math.floor(Math.random() * transportData.length);
        state[`p${p}`].target = transportData[index];
        document.getElementById(`prompt${p}`).innerText = transportData[index].name.toUpperCase();
        transportData.forEach((data) => createBouncingItem(p, data));
    }

    function createBouncingItem(p, data) {
        const side = document.getElementById(`p${p}-side`);
        const item = document.createElement('div');
        item.className = 'transport-item';
        item.style.backgroundImage = `url('${data.img}')`;
        
        let posX = Math.random() * (side.offsetWidth - 110);
        let posY = Math.random() * (side.offsetHeight - 110);
        let speedX = (Math.random() - 0.5) * 12;
        let speedY = (Math.random() - 0.5) * 12;

        item.style.left = posX + 'px';
        item.style.top = posY + 'px';
        side.appendChild(item);

        let moveInterval = setInterval(() => {
            if (state.paused || state[`p${p}`].frozen || state.time <= 0) return;
            
            posX += speedX;
            posY += speedY;

            if (posX <= 0 || posX >= side.offsetWidth - 110) speedX *= -1;
            if (posY <= 0 || posY >= side.offsetHeight - 110) speedY *= -1;

            item.style.left = posX + 'px';
            item.style.top = posY + 'px';
        }, 20);

        state[`p${p}`].intervals.push(moveInterval);

        item.onmousedown = (e) => {
            if (state.paused || state[`p${p}`].frozen) return;
            if (data.name === state[`p${p}`].target.name) {
                state[`p${p}`].score++;
                document.getElementById(`s${p}`).innerText = state[`p${p}`].score;
                showPraise(p);
                spawnLevel(p);
            } else {
                triggerFreeze(p);
            }
        };
    }

    function showPraise(p) {
        const box = document.getElementById(`praise${p}`);
        box.innerText = praises[Math.floor(Math.random() * praises.length)];
        box.style.display = 'block';
        setTimeout(() => box.style.display = 'none', 800);
    }

    function triggerFreeze(p) {
        state[`p${p}`].frozen = true;
        document.getElementById(`f${p}`).style.display = 'flex';
        setTimeout(() => {
            document.getElementById(`f${p}`).style.display = 'none';
            state[`p${p}`].frozen = false;
        }, 500);
    }

    // Timer Loop
    const clock = setInterval(() => {
        if (!state.paused && state.time > 0) {
            state.time--;
            document.getElementById('clock').innerText = state.time;
            if (state.time <= 0) {
                clearInterval(clock);
                endGame();
            }
        }
    }, 1000);

    function endGame() {
        document.getElementById('end-screen').style.display = 'flex';
        const msg = document.getElementById('winner-text');
        const p1 = state.p1.score, p2 = state.p2.score;
        msg.innerText = p1 > p2 ? "PLAYER 1 WINS!" : (p2 > p1 ? "PLAYER 2 WINS!" : "IT'S A DRAW!");
    }

    // Initial Spawn
    spawnLevel(1);
    spawnLevel(2);
</script>
</body>
</html>
